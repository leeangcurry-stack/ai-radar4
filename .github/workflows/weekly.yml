name: AI Radar 每日更新

on:
  schedule:
    - cron: "45 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 运行爬虫
        run: python scraper.py

      - name: 推送数据到仓库
        run: |
          git config user.name "AI Radar Bot"
          git config user.email "bot@ai-radar"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "data: update $(date +'%Y-%m-%d')"
          git push
