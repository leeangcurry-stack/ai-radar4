# .github/workflows/weekly.yml
# 每周一 09:00 北京时间自动爬取 RSS，生成 data.json，推送到 Pages
# 无需任何 API Key

name: AI Radar 自动更新

on:
  schedule:
    - cron: "0 1 * * 1"   # 每周一 01:00 UTC = 北京时间 09:00
  workflow_dispatch:        # 支持手动触发

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 运行爬虫（无需安装额外依赖，只用标准库）
        run: python scraper.py

      - name: 推送数据到仓库（触发 Pages 自动更新）
        run: |
          git config user.name  "AI Radar Bot"
          git config user.email "bot@ai-radar"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "data: update $(date +'%Y-%m-%d')"
          git push
